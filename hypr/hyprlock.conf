# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/wallpaper.png

    blur_passes = 5
    contrast = 0.95
    brightness = 0.75

    vibrancy = 0.25
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# PROFILE IMAGE (CIRCULAR)
image {
    monitor =
    path = ~/.config/hypr/dot_square.png

    size = 110
    rounding = -1

    border_size = 2
    border_color = rgba(122, 162, 247, 0.8)

    position = 0, 250 
    halign = center
    valign = center
}

# TIME (PRIMARY)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"

    color = rgba(192, 202, 245, 1.0)
    font_size = 132
    font_family = IBM Plex Mono

    position = 0, 80
    halign = center
    valign = center
}

# DATE (SECONDARY)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"

    color = rgba(168, 178, 214, 0.75)
    font_size = 22
    font_family = IBM Plex Mono

    position = 0, -50
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =   $USER

    color = rgba(125, 207, 255, 0.85)
    font_size = 18
    font_family = IBM Plex Mono

    position = 0, -120
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 60

    outline_thickness = 2

    outer_color = rgba(122, 162, 247, 0.8)
    inner_color = rgba(20, 20, 35, 0.7)

    font_color = rgba(192, 202, 245, 1.0)
    font_family = IBM Plex Mono

    fade_on_empty = false
    hide_input = false

    placeholder_text = Enter Password

    position = 0, -190
    halign = center
    valign = center

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
}
